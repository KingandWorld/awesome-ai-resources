<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="btn" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="720" height="480" fill="url(#bg)" rx="8"/>
  <!-- Browser frame -->
  <rect x="20" y="10" width="680" height="460" fill="#0f172a" rx="6"/>
  <!-- Browser top bar -->
  <rect x="20" y="10" width="680" height="36" fill="#1e293b" rx="6"/>
  <circle cx="42" cy="28" r="5" fill="#ef4444"/>
  <circle cx="58" cy="28" r="5" fill="#f59e0b"/>
  <circle cx="74" cy="28" r="5" fill="#22c55e"/>
  <!-- URL bar -->
  <rect x="200" y="20" width="320" height="18" fill="#0f172a" rx="9"/>
  <text x="360" y="33" fill="#94a3b8" font-size="10" text-anchor="middle">platform.deepseek.com</text>
  <!-- Sign Up Card -->
  <rect x="200" y="70" width="320" height="310" fill="#1e293b" rx="12"/>
  <text x="360" y="110" fill="#f1f5f9" font-size="18" font-weight="bold" text-anchor="middle">Create Account</text>
  <text x="360" y="130" fill="#94a3b8" font-size="11" text-anchor="middle">Get started with DeepSeek API</text>
  <!-- Email -->
  <rect x="230" y="150" width="260" height="36" fill="#0f172a" rx="6" stroke="#334155" stroke-width="1"/>
  <text x="240" y="173" fill="#64748b" font-size="11">Email address</text>
  <!-- Password -->
  <rect x="230" y="198" width="260" height="36" fill="#0f172a" rx="6" stroke="#334155" stroke-width="1"/>
  <text x="240" y="221" fill="#64748b" font-size="11">Password</text>
  <!-- Sign Up button -->
  <rect x="230" y="250" width="260" height="38" fill="url(#btn)" rx="8"/>
  <text x="360" y="275" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">Sign Up →</text>
  <!-- Divider -->
  <line x1="230" y1="310" x2="490" y2="310" stroke="#334155" stroke-width="1"/>
  <!-- Google button -->
  <rect x="230" y="325" width="260" height="36" fill="transparent" stroke="#334155" stroke-width="1" rx="8"/>
  <text x="360" y="348" fill="#94a3b8" font-size="12" text-anchor="middle">Continue with Google</text>
  <!-- Footer -->
  <rect x="200" y="400" width="320" height="30" fill="#1e293b" rx="0 0 12 12"/>
  <text x="360" y="419" fill="#64748b" font-size="10" text-anchor="middle">Already have an account? Sign in</text>
  <!-- Arrow annotation -->
  <line x1="540" y1="90" x2="540" y2="115" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="540,118 536,110 544,110" fill="#f59e0b"/>
  <text x="555" y="108" fill="#f59e0b" font-size="11" font-weight="bold">点击 Sign Up</text>
</svg>
