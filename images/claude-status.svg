<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 430" font-family="'Fira Code', 'JetBrains Mono', 'Cascadia Code', 'Consolas', monospace">
  <defs>
    <linearGradient id="term-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
  </defs>
  <!-- Terminal window -->
  <rect width="680" height="430" fill="#1c2128" rx="10"/>
  <!-- Title bar -->
  <rect width="680" height="40" fill="#2d333b" rx="10 10 0 0"/>
  <circle cx="30" cy="20" r="6" fill="#ef4444"/>
  <circle cx="50" cy="20" r="6" fill="#f59e0b"/>
  <circle cx="70" cy="20" r="6" fill="#22c55e"/>
  <text x="340" y="25" fill="#8b949e" font-size="12" font-family="system-ui, sans-serif" text-anchor="middle">Claude Code</text>

  <!-- Terminal content -->
  <rect x="0" y="40" width="680" height="390" fill="url(#term-bg)" rx="0 0 10 10"/>

  <!-- Line 1: prompt -->
  <text x="30" y="80" fill="#22c55e" font-size="13">❯</text>
  <text x="50" y="80" fill="#e6edf3" font-size="13">/status</text>

  <!-- Separator line -->
  <line x1="30" y1="95" x2="650" y2="95" stroke="#30363d" stroke-width="1"/>

  <!-- Status header -->
  <rect x="30" y="108" width="160" height="22" fill="#1f6feb30" rx="4"/>
  <text x="110" y="123" fill="#58a6ff" font-size="12" font-weight="bold" text-anchor="middle">📊 Claude Code Status</text>

  <!-- Status items -->
  <!-- Auth -->
  <text x="45" y="160" fill="#8b949e" font-size="12">Authentication</text>
  <text x="280" y="160" fill="#e6edf3" font-size="12">:</text>
  <rect x="300" y="150" width="80" height="18" fill="#22c55e30" rx="9"/>
  <text x="340" y="163" fill="#22c55e" font-size="11" text-anchor="middle">Connected ✅</text>
  <text x="400" y="163" fill="#8b949e" font-size="11">(via DeepSeek)</text>

  <!-- API Endpoint - this is the key info to highlight -->
  <text x="45" y="190" fill="#8b949e" font-size="12">API Endpoint</text>
  <text x="280" y="190" fill="#e6edf3" font-size="12">:</text>
  <rect x="300" y="181" width="260" height="18" fill="#f59e0b20" rx="4" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="310" y="194" fill="#f59e0b" font-size="12" font-weight="bold">https://api.deepseek.com/anthropic</text>

  <!-- Annotation arrow -->
  <line x1="570" y1="190" x2="620" y2="160" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="620,160 614,162 616,155" fill="#f59e0b"/>
  <text x="630" y="155" fill="#f59e0b" font-size="10" font-weight="bold">对！就是这里</text>

  <!-- Model -->
  <text x="45" y="218" fill="#8b949e" font-size="12">Model</text>
  <text x="280" y="218" fill="#e6edf3" font-size="12">:</text>
  <text x="300" y="218" fill="#e6edf3" font-size="12">deepseek-v4-pro</text>
  <rect x="30" y="208" width="250" height="22" fill="#22c55e10" rx="4"/>
  <text x="180" y="223" fill="#22c55e" font-size="10" text-anchor="middle">← 确认模型名称</text>

  <!-- Token Usage -->
  <text x="45" y="248" fill="#8b949e" font-size="12">Token Usage</text>
  <text x="280" y="248" fill="#e6edf3" font-size="12">:</text>
  <text x="300" y="248" fill="#e6edf3" font-size="12">12,847 / 1,000,000</text>
  <rect x="420" y="238" width="120" height="14" fill="#30363d" rx="7"/>
  <rect x="420" y="238" width="18" height="14" fill="#58a6ff" rx="7" opacity="0.7"/>

  <!-- Mode -->
  <text x="45" y="275" fill="#8b949e" font-size="12">Mode</text>
  <text x="280" y="275" fill="#e6edf3" font-size="12">:</text>
  <text x="300" y="275" fill="#e6edf3" font-size="12">Normal</text>

  <!-- Disabled traffic -->
  <text x="45" y="302" fill="#8b949e" font-size="12">Non-essential Traffic</text>
  <text x="280" y="302" fill="#e6edf3" font-size="12">:</text>
  <text x="300" y="302" fill="#22c55e" font-size="12">Disabled ✅</text>

  <!-- Effort level -->
  <text x="45" y="329" fill="#8b949e" font-size="12">Effort Level</text>
  <text x="280" y="329" fill="#e6edf3" font-size="12">:</text>
  <text x="300" y="329" fill="#e6edf3" font-size="12">max</text>

  <!-- Success message -->
  <line x1="30" y1="350" x2="650" y2="350" stroke="#30363d" stroke-width="1"/>
  <text x="30" y="378" fill="#22c55e" font-size="12">✓ Configuration verified. All systems ready.</text>
  <text x="30" y="400" fill="#8b949e" font-size="12">Type </text>
  <text x="70" y="400" fill="#22c55e" font-size="12">'/help'</text>
  <text x="112" y="400" fill="#8b949e" font-size="12"> for available commands</text>

  <!-- Cursor -->
  <rect x="30" y="412" width="60" height="20" fill="#2d333b" rx="4"/>
  <text x="40" y="427" fill="#22c55e" font-size="13">❯</text>
  <rect x="56" y="415" width="8" height="16" fill="#e6edf3" style="animation: blink 1s infinite"/>
  <style>
    @keyframes blink { 0%,100% { opacity:1 } 50% { opacity:0 } }
  </style>
</svg>
